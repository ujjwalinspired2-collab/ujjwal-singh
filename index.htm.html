<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bundle-Media | Professional Video Editing</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        /* Base Reset & Variables */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: 'Inter', sans-serif;
            background-color: #050505;
            color: #ffffff;
            line-height: 1.6;
        }
        a {
            color: inherit;
            text-decoration: none;
            transition: color 0.3s ease;
        }
        a:hover {
            color: #a1a1aa;
        }
        ul {
            list-style: none;
        }
        
        /* Reusable Layout */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
        }
        section {
            padding: 100px 0;
        }
        .section-title {
            font-size: 2.5rem;
            text-align: center;
            margin-bottom: 15px;
            font-weight: 800;
        }
        .section-subtitle {
            text-align: center;
            color: #a1a1aa;
            margin-bottom: 60px;
            font-size: 1.1rem;
        }

        /* Navigation */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            position: sticky;
            top: 0;
            background: rgba(5, 5, 5, 0.85);
            backdrop-filter: blur(12px);
            z-index: 1000;
            border-bottom: 1px solid #1a1a1a;
        }
        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            letter-spacing: -0.5px;
        }
        nav ul {
            display: flex;
            gap: 30px;
            font-weight: 600;
            font-size: 0.95rem;
            color: #d4d4d8;
        }
        .btn-nav {
            background: #ffffff;
            color: #000000;
            padding: 10px 24px;
            border-radius: 50px;
            font-weight: 600;
        }
        .btn-nav:hover {
            background: #e4e4e7;
            color: #000;
        }

        /* Hero Section */
        .hero {
            text-align: center;
            padding: 140px 20px 100px;
        }
        .hero h1 {
            font-size: 4.5rem;
            line-height: 1.1;
            font-weight: 800;
            max-width: 900px;
            margin: 0 auto 24px;
            letter-spacing: -1.5px;
        }
        .hero p {
            font-size: 1.25rem;
            color: #a1a1aa;
            margin-bottom: 40px;
        }
        .hero .btn-main {
            display: inline-block;
            background: #ffffff;
            color: #000000;
            padding: 18px 40px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
        }

        /* Client Marquee */
        .marquee-wrapper {
            background: #0a0a0a;
            padding: 40px 0;
            overflow: hidden;
            border-top: 1px solid #1a1a1a;
            border-bottom: 1px solid #1a1a1a;
            white-space: nowrap;
        }
        .marquee {
            display: inline-block;
            animation: scroll 25s linear infinite;
        }
        .marquee span {
            font-size: 1.8rem;
            font-weight: 800;
            color: #333;
            margin-right: 60px;
            text-transform: uppercase;
        }
        @keyframes scroll {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); }
        }

        /* Stats & Reviews */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            text-align: center;
            margin-top: 60px;
        }
        .stat-card {
            background: #0f0f0f;
            padding: 40px 20px;
            border-radius: 16px;
            border: 1px solid #1a1a1a;
        }
        .stat-card h3 {
            font-size: 3rem;
            font-weight: 800;
            margin-bottom: 10px;
        }
        .stat-card p {
            color: #a1a1aa;
            font-size: 1.1rem;
        }

        /* How It Works */
        .steps-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
        }
        .step-card {
            background: #0f0f0f;
            padding: 40px 30px;
            border-radius: 16px;
            border: 1px solid #1a1a1a;
        }
        .step-num {
            font-size: 3rem;
            font-weight: 800;
            color: #222;
            margin-bottom: 20px;
            line-height: 1;
        }
        .step-card h4 {
            font-size: 1.25rem;
            margin-bottom: 10px;
        }
        .step-card p {
            color: #a1a1aa;
            font-size: 0.95rem;
        }

        /* Footer & Contact Update */
        footer {
            background: #050505;
            border-top: 1px solid #1a1a1a;
            padding: 80px 0 40px;
            margin-top: 50px;
        }
        .footer-grid
