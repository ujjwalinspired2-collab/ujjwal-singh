<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Crunch Edits</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
    }

    .hero {
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      padding: 20px;
    }

    h1 {
      font-size: 70px;
      max-width: 900px;
      line-height: 1.1;
      margin-bottom: 20px;
    }

    p {
      color: #a1a1aa;
      max-width: 700px;
      font-size: 20px;
    }

    .buttons {
      margin-top: 40px;
      display: flex;
      gap: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .btn-white {
      background: white;
      color: black;
      padding: 15px 30px;
      border-radius: 999px;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }

    .btn-dark {
      background: transparent;
      color: white;
      padding: 15px 30px;
      border-radius: 999px;
      border: 1px solid #333;
      cursor: pointer;
    }

    .preview {
      margin-top: 70px;
      width: 90%;
      max-width: 1000px;
      height: 500px;
      border-radius: 30px;
      background: linear-gradient(to bottom right, #27272a, black);
      border: 1px solid #222;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 50px;
      color: rgba(255,255,255,0.2);
      font-weight: bold;
    }

    @media(max-width:768px) {
      h1 {
        font-size: 45px;
      }

      .preview {
        height: 300px;
        font-size: 30px;
      }
    }
  </style>
</head>

<body>

  <section class="hero">

    <h1>
      We Turn Creators Into Content Machines.
    </h1>

    <p>
      Crunch Edits helps creators scale faster with premium YouTube editing,
      shorts, thumbnails, and motion graphics.
    </p>

    <div class="buttons">

      <button class="btn-white">
        Start Scaling
      </button>

      <button class="btn-dark">
        View Work
      </button>

    </div>

    <div class="preview">
      Crunch Edits
    </div>

  </section>

</body>
</html>
